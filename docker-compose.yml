services:
  saildesk:
    build: .
    container_name: saildesk
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ~/Desktop/gribs:/gribs   # GRIBs stay on Desktop, mounted read-only into container
    environment:
      - GRIB_DIR=/gribs
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
    restart: unless-stopped
